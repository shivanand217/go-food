apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: go-food-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
  - host: gofood.local
    http:
      paths:
      - path: /api/users(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: user-service
            port:
              number: 8081
      - path: /api/restaurants(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: restaurant-service
            port:
              number: 8082
      - path: /api/orders(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: order-service
            port:
              number: 8083
      - path: /api/delivery(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: delivery-service
            port:
              number: 8084
      # API Gateway Fallback
      - path: /?(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: api-gateway
            port:
              number: 8080
