services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: swiggy
      POSTGRES_PASSWORD: password
      POSTGRES_DB: swiggy_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "22181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api-gateway:
    build:
      context: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - USER_SERVICE_URL=http://user-service:8081
      - RESTAURANT_SERVICE_URL=http://restaurant-service:8082
      - ORDER_SERVICE_URL=http://order-service:8083
      - DELIVERY_SERVICE_URL=http://delivery-service:8084
    depends_on:
      - user-service
      - restaurant-service
      - order-service
      - delivery-service

  user-service:
    build:
      context: ./user-service
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DATABASE_URL=host=postgres user=swiggy password=password dbname=swiggy_db port=5432 sslmode=disable
    depends_on:
      - postgres

  restaurant-service:
    build:
      context: ./restaurant-service
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - MONGO_URI=mongodb://mongo:27017
    depends_on:
      - mongo

  order-service:
    build:
      context: ./order-service
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - DATABASE_URL=host=postgres user=swiggy password=password dbname=swiggy_db port=5432 sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_ORDER_TOPIC=orders
    depends_on:
      - postgres
      - kafka

  delivery-service:
    build:
      context: ./delivery-service
    ports:
      - "8084:8084"
    environment:
      - PORT=8084
      - DATABASE_URL=host=postgres user=swiggy password=password dbname=swiggy_db port=5432 sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CONSUMER_GROUP=delivery-service-group
      - KAFKA_ORDER_TOPIC=orders
    depends_on:
      - postgres
      - kafka

volumes:
  postgres_data:
  mongo_data:
